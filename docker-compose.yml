version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8080:8080"
    volumes:
      - ./flights.json:/data/flights.json:ro
    environment:
      - SERVER_PORT=8080
      - APP_FLIGHTS_PATH=file:/data/flights.json
      - APP_CORS_ALLOWED_ORIGIN=http://localhost:3000

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
